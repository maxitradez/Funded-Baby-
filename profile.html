<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>Profile | Funded Baby</title>

<link rel="stylesheet" href="profile.css"/>

<script type="module"
src="profile.js" defer></script>

</head>

<body>

<div class="bg-glow"></div>

<!-- TOPBAR -->

<header class="topbar">

<div class="logo">

<div class="logo-box">M</div>

<h2>Funded Baby</h2>

</div>

<a href="dashboard.html"
class="dashboard-btn">

Dashboard

</a>

</header>


<!-- PROFILE -->

<main class="profile-container">

<!-- PROFILE HERO -->

<section class="profile-hero">

<div class="avatar">

<span id="avatarLetter">M</span>

</div>

<div class="hero-info">

<h1 id="fullName">
Trader
</h1>

<p id="emailText">
Loading...
</p>

<div class="status-badge">

Active Trader

</div>

</div>

</section>


<!-- GRID -->

<section class="profile-grid">

<!-- PERSONAL INFO -->

<div class="profile-card">

<h2>Personal Information</h2>

<div class="info-row">
<span>Username</span>
<strong id="usernameText">-</strong>
</div>

<div class="info-row">
<span>Email</span>
<strong id="profileEmail">-</strong>
</div>

<div class="info-row">
<span>Country</span>
<strong id="countryText">-</strong>
</div>

<div class="info-row">
<span>Joined</span>
<strong id="joinedText">-</strong>
</div>

</div>


<!-- TRADER STATS -->

<div class="profile-card">

<h2>Trader Statistics</h2>

<div class="stats-grid">

<div class="mini-stat">
<span>Total Accounts</span>
<h3 id="accountsStat">0</h3>
</div>

<div class="mini-stat">
<span>Total Balance</span>
<h3 id="balanceStat">$0</h3>
</div>

<div class="mini-stat">
<span>Best Progress</span>
<h3 id="progressStat">0%</h3>
</div>

<div class="mini-stat">
<span>Payouts</span>
<h3>$0</h3>
</div>

</div>

</div>


<!-- SECURITY -->

<div class="profile-card">

<h2>Security</h2>

<button class="security-btn">
Change Password
</button>

<button class="security-btn">
Enable 2FA
</button>

</div>

</section>

</main>

</body>

</html>
