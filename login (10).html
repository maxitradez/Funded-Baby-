<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In – Funded Baby</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --gold: #C9A84C;
  --gold-light: #E4C76B;
  --gold-dark: #A8882E;
  --gold-dim: rgba(201,168,76,0.12);
  --black: #080808;
  --dark: #0d0d0d;
  --card: #111111;
  --card2: #161616;
  --border: rgba(201,168,76,0.2);
  --border2: rgba(255,255,255,0.07);
  --text: #F0EAD6;
  --muted: #7a7060;
  --green: #4ade80;
  --red: #f87171;
}
body { font-family:'Inter',sans-serif; background:var(--dark); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

/* NAV */
nav {
  position:fixed; top:0; left:0; right:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 5%; height:66px;
  background:rgba(8,8,8,0.96); backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border2);
}
.logo { font-family:'Playfair Display',serif; font-size:20px; font-weight:800; color:var(--text); display:flex; align-items:center; gap:10px; text-decoration:none; }
.logo-mark { width:32px; height:32px; background:var(--gold); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; color:#080808; font-weight:800; font-family:'Inter',sans-serif; }
.nav-links { display:flex; gap:24px; align-items:center; }
.nav-links a { color:var(--muted); text-decoration:none; font-size:14px; font-weight:500; transition:color .2s; }
.nav-links a:hover { color:var(--text); }
.btn { cursor:pointer; font-family:'Inter',sans-serif; border:none; border-radius:8px; font-size:14px; font-weight:500; padding:9px 18px; transition:all .2s; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
.btn-ghost { background:transparent; color:var(--text); border:1px solid var(--border2); }
.btn-ghost:hover { border-color:var(--gold); color:var(--gold-light); }
.btn-primary { background:var(--gold); color:#080808; font-weight:600; }
.btn-primary:hover { background:var(--gold-light); transform:translateY(-1px); }

/* PAGE */
.auth-page { flex:1; display:flex; align-items:center; justify-content:center; padding:100px 20px 60px; position:relative; overflow:hidden; }
.auth-page::before { content:''; position:absolute; top:-80px; left:50%; transform:translateX(-50%); width:700px; height:500px; background:radial-gradient(ellipse,rgba(201,168,76,0.05) 0%,transparent 70%); pointer-events:none; }

.auth-card {
  width:100%; max-width:420px;
  background:var(--card); border:1px solid var(--border);
  border-radius:16px; padding:40px; position:relative; z-index:1;
}
.auth-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); border-radius:16px 16px 0 0; }

.auth-header { text-align:center; margin-bottom:32px; }
.auth-icon { width:52px; height:52px; background:var(--gold-dim); border:1px solid var(--border); border-radius:12px; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; font-size:24px; }
.auth-header h1 { font-family:'Playfair Display',serif; font-size:28px; font-weight:800; color:var(--text); margin-bottom:6px; }
.auth-header p { color:var(--muted); font-size:14px; font-weight:400; line-height:1.6; }

.form-group { margin-bottom:20px; }
.form-group label { display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:8px; letter-spacing:.04em; text-transform:uppercase; }
.form-group input { width:100%; padding:12px 16px; background:var(--card2); border:1px solid var(--border2); border-radius:8px; color:var(--text); font-size:14px; font-family:'Inter',sans-serif; outline:none; transition:border-color .2s; font-weight:400; }
.form-group input:focus { border-color:var(--gold); }
.form-group input::placeholder { color:var(--muted); }

.form-options { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; font-size:13px; }
.form-options label { display:flex; align-items:center; gap:8px; color:var(--muted); cursor:pointer; font-weight:400; }
.form-options label input { accent-color:var(--gold); width:auto; }
.form-options a { color:var(--gold-light); text-decoration:none; font-weight:500; }
.form-options a:hover { text-decoration:underline; }

.btn-submit { width:100%; padding:13px; background:var(--gold); color:#080808; border:none; border-radius:8px; font-family:'Inter',sans-serif; font-size:15px; font-weight:700; cursor:pointer; transition:all .2s; }
.btn-submit:hover { background:var(--gold-light); transform:translateY(-1px); box-shadow:0 6px 20px rgba(201,168,76,0.2); }
.btn-submit:active { transform:translateY(0); }
.btn-submit:disabled { opacity:.6; cursor:not-allowed; transform:none; }

.divider { display:flex; align-items:center; gap:12px; margin:20px 0; color:var(--muted); font-size:12px; font-weight:400; }
.divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border2); }

.auth-footer { text-align:center; margin-top:20px; font-size:13px; color:var(--muted); font-weight:400; }
.auth-footer a { color:var(--gold-light); font-weight:600; text-decoration:none; }
.auth-footer a:hover { text-decoration:underline; }

.alert { padding:12px 16px; border-radius:8px; margin-bottom:16px; font-size:14px; display:none; font-weight:400; }
.alert.error { background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.3); color:#fca5a5; }
.alert.success { background:rgba(74,222,128,0.1); border:1px solid rgba(74,222,128,0.3); color:#86efac; }
.alert.show { display:block; }

.spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(8,8,8,0.3); border-top-color:#080808; border-radius:50%; animation:spin .6s linear infinite; vertical-align:middle; margin-right:6px; }
@keyframes spin { to{transform:rotate(360deg)} }

@media(max-width:600px) {
  nav { padding:0 4%; }
  .nav-links { display:none; }
  .auth-card { padding:28px 20px; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-mark">F</div>
    Funded Baby
  </a>
  <div class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="index.html#programs">Programs</a>
    <a href="index.html#why">Why Us</a>
    <a href="index.html#contact">Contact</a>
    <a href="login.html" class="btn btn-ghost" id="navLogin">Log In</a>
    <a href="signup.html" class="btn btn-primary" id="navSignup">Get Funded →</a>
    <a href="dashboard.html" class="btn btn-ghost" id="navDashboard" style="display:none">Dashboard</a>
    <a href="profile.html" class="btn btn-primary" id="navProfile" style="display:none">My Profile</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">🔑</div>
      <h1>Welcome Back</h1>
      <p>Sign in to access your Funded Baby dashboard</p>
    </div>

    <div class="alert error" id="alertError"></div>
    <div class="alert success" id="alertSuccess"></div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <div class="form-options">
      <label><input type="checkbox"> Remember me</label>
      <a href="javascript:void(0)">Forgot password?</a>
    </div>

    <button class="btn-submit" id="loginBtn" onclick="handleLogin()">Log In to Dashboard</button>
    <div class="divider">or</div>
    <div class="auth-footer" style="margin-top:0">
      Don't have an account? <a href="signup.html">Create one free →</a>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDaKGU5Nrtof0lA7GwZN9baIwdpVZaftbQ",
  authDomain: "the-funded.firebaseapp.com",
  projectId: "the-funded",
  storageBucket: "the-funded.firebasestorage.app",
  messagingSenderId: "656425279116",
  appId: "1:656425279116:web:d309fc0a731066f28225a9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  const show = (id, v) => { const el=document.getElementById(id); if(el) el.style.display = v ? '' : 'none'; };
  if (user) {
    window.location.href = 'dashboard.html';
    return;
  }
  show('navLogin', true); show('navSignup', true);
  show('navDashboard', false); show('navProfile', false);
});

window.handleLogin = async function() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('alertError');
  const okEl = document.getElementById('alertSuccess');
  errEl.classList.remove('show'); okEl.classList.remove('show');

  if (!email || !password) {
    errEl.textContent = 'Please fill in all fields.';
    errEl.classList.add('show'); return;
  }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Logging in…';
  try {
    await signInWithEmailAndPassword(auth, email, password);
    okEl.textContent = 'Login successful! Redirecting…';
    okEl.classList.add('show');
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
  } catch (err) {
    const msgs = {
      'auth/user-not-found': 'No account found with this email.',
      'auth/wrong-password': 'Incorrect password. Try again.',
      'auth/invalid-credential': 'Invalid email or password.',
      'auth/too-many-requests': 'Too many attempts. Please wait a moment.',
    };
    errEl.textContent = msgs[err.code] || 'Login failed. Please try again.';
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Log In to Dashboard';
  }
};

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') window.handleLogin();
});
</script>
</body>
</html>
