<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up – Funded Baby</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --gold: #C9A84C;
  --gold-light: #E4C76B;
  --gold-dark: #A8882E;
  --gold-dim: rgba(201,168,76,0.12);
  --black: #080808;
  --dark: #0d0d0d;
  --card: #111111;
  --card2: #161616;
  --border: rgba(201,168,76,0.2);
  --border2: rgba(255,255,255,0.07);
  --text: #F0EAD6;
  --muted: #7a7060;
  --green: #4ade80;
  --red: #f87171;
}
body { font-family:'Inter',sans-serif; background:var(--dark); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

nav {
  position:fixed; top:0; left:0; right:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 5%; height:66px;
  background:rgba(8,8,8,0.96); backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border2);
}
.logo { font-family:'Playfair Display',serif; font-size:20px; font-weight:800; color:var(--text); display:flex; align-items:center; gap:10px; text-decoration:none; }
.logo-mark { width:32px; height:32px; background:var(--gold); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; color:#080808; font-weight:800; font-family:'Inter',sans-serif; }
.nav-links { display:flex; gap:24px; align-items:center; }
.nav-links a { color:var(--muted); text-decoration:none; font-size:14px; font-weight:500; transition:color .2s; }
.nav-links a:hover { color:var(--text); }
.btn { cursor:pointer; font-family:'Inter',sans-serif; border:none; border-radius:8px; font-size:14px; font-weight:500; padding:9px 18px; transition:all .2s; text-decoration:none; display:inline-flex; align-items:center; }
.btn-ghost { background:transparent; color:var(--text); border:1px solid var(--border2); }
.btn-ghost:hover { border-color:var(--gold); color:var(--gold-light); }
.btn-primary { background:var(--gold); color:#080808; font-weight:600; }
.btn-primary:hover { background:var(--gold-light); transform:translateY(-1px); }

.auth-page { flex:1; display:flex; align-items:center; justify-content:center; padding:100px 20px 60px; position:relative; overflow:hidden; }
.auth-page::before { content:''; position:absolute; top:-80px; left:50%; transform:translateX(-50%); width:700px; height:500px; background:radial-gradient(ellipse,rgba(201,168,76,0.05) 0%,transparent 70%); pointer-events:none; }

.auth-card {
  width:100%; max-width:480px;
  background:var(--card); border:1px solid var(--border);
  border-radius:16px; padding:40px; position:relative; z-index:1;
}
.auth-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); border-radius:16px 16px 0 0; }

.auth-header { text-align:center; margin-bottom:28px; }
.auth-icon { width:52px; height:52px; background:var(--gold-dim); border:1px solid var(--border); border-radius:12px; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; font-size:24px; }
.auth-header h1 { font-family:'Playfair Display',serif; font-size:28px; font-weight:800; margin-bottom:6px; }
.auth-header p { color:var(--muted); font-size:14px; font-weight:400; }

.perks { display:flex; justify-content:center; gap:20px; flex-wrap:wrap; margin-bottom:24px; }
.perk { font-size:12px; color:var(--muted); display:flex; align-items:center; gap:6px; font-weight:500; }
.perk::before { content:'✓'; color:var(--gold-light); font-weight:700; }

.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-group { margin-bottom:18px; }
.form-group label { display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:8px; letter-spacing:.04em; text-transform:uppercase; }
.form-group input, .form-group select { width:100%; padding:12px 16px; background:var(--card2); border:1px solid var(--border2); border-radius:8px; color:var(--text); font-size:14px; font-family:'Inter',sans-serif; outline:none; transition:border-color .2s; font-weight:400; }
.form-group input:focus, .form-group select:focus { border-color:var(--gold); }
.form-group input::placeholder { color:var(--muted); }
.form-group select option { background:var(--card2); }

.terms { font-size:12px; color:var(--muted); margin-bottom:20px; display:flex; align-items:flex-start; gap:10px; line-height:1.5; font-weight:400; }
.terms input { margin-top:2px; accent-color:var(--gold); flex-shrink:0; }
.terms a { color:var(--gold-light); text-decoration:none; font-weight:500; }

.btn-submit { width:100%; padding:13px; background:var(--gold); color:#080808; border:none; border-radius:8px; font-family:'Inter',sans-serif; font-size:15px; font-weight:700; cursor:pointer; transition:all .2s; }
.btn-submit:hover { background:var(--gold-light); transform:translateY(-1px); box-shadow:0 6px 20px rgba(201,168,76,0.2); }
.btn-submit:disabled { opacity:.6; cursor:not-allowed; transform:none; }

.divider { display:flex; align-items:center; gap:12px; margin:20px 0; color:var(--muted); font-size:12px; font-weight:400; }
.divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border2); }

.auth-footer { text-align:center; font-size:13px; color:var(--muted); font-weight:400; }
.auth-footer a { color:var(--gold-light); font-weight:600; text-decoration:none; }

.alert { padding:12px 16px; border-radius:8px; margin-bottom:16px; font-size:14px; display:none; font-weight:400; }
.alert.error { background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.3); color:#fca5a5; }
.alert.success { background:rgba(74,222,128,0.1); border:1px solid rgba(74,222,128,0.3); color:#86efac; }
.alert.show { display:block; }

.spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(8,8,8,0.3); border-top-color:#080808; border-radius:50%; animation:spin .6s linear infinite; vertical-align:middle; margin-right:6px; }
@keyframes spin { to{transform:rotate(360deg)} }

@media(max-width:600px) {
  nav { padding:0 4%; }
  .nav-links { display:none; }
  .auth-card { padding:28px 20px; }
  .form-row { grid-template-columns:1fr; }
  .perks { gap:12px; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-mark">F</div>
    Funded Baby
  </a>
  <div class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="index.html#programs">Programs</a>
    <a href="index.html#why">Why Us</a>
    <a href="index.html#contact">Contact</a>
    <a href="login.html" class="btn btn-ghost" id="navLogin">Log In</a>
    <a href="signup.html" class="btn btn-primary" id="navSignup">Get Funded →</a>
    <a href="dashboard.html" class="btn btn-ghost" id="navDashboard" style="display:none">Dashboard</a>
    <a href="profile.html" class="btn btn-primary" id="navProfile" style="display:none">My Profile</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">🚀</div>
      <h1>Create Account</h1>
      <p>Join 2,400+ traders already earning with Funded Baby</p>
    </div>

    <div class="perks">
      <span class="perk">Free to register</span>
      <span class="perk">Real-time tracking</span>
      <span class="perk">Instant dashboard access</span>
    </div>

    <div class="alert error" id="alertError"></div>
    <div class="alert success" id="alertSuccess"></div>

    <div class="form-row">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" id="s-fname" placeholder="John" autocomplete="given-name">
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" id="s-lname" placeholder="Smith" autocomplete="family-name">
      </div>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="s-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Country</label>
      <select id="s-country">
        <option value="">Select your country…</option>
        <option>Kenya</option>
        <option>Nigeria</option>
        <option>South Africa</option>
        <option>Ghana</option>
        <option>Uganda</option>
        <option>Tanzania</option>
        <option>United States</option>
        <option>United Kingdom</option>
        <option>Canada</option>
        <option>Australia</option>
        <option>India</option>
        <option>Other</option>
      </select>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="s-pass" placeholder="Min. 8 characters" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="s-pass2" placeholder="Repeat your password" autocomplete="new-password">
    </div>

    <div class="terms">
      <input type="checkbox" id="s-terms">
      <label for="s-terms">By creating an account you agree to our <a href="javascript:void(0)">Terms of Service</a> and <a href="javascript:void(0)">Privacy Policy</a>.</label>
    </div>

    <button class="btn-submit" id="signupBtn" onclick="handleSignup()">Create My Account</button>
    <div class="divider">or</div>
    <div class="auth-footer">Already have an account? <a href="login.html">Log In →</a></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDaKGU5Nrtof0lA7GwZN9baIwdpVZaftbQ",
  authDomain: "the-funded.firebaseapp.com",
  projectId: "the-funded",
  storageBucket: "the-funded.firebasestorage.app",
  messagingSenderId: "656425279116",
  appId: "1:656425279116:web:d309fc0a731066f28225a9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, (user) => {
  const show = (id, v) => { const el=document.getElementById(id); if(el) el.style.display = v ? '' : 'none'; };
  if (user) {
    window.location.href = 'dashboard.html';
    return;
  }
  show('navLogin', true); show('navSignup', true);
  show('navDashboard', false); show('navProfile', false);
});

window.handleSignup = async function() {
  const fname = document.getElementById('s-fname').value.trim();
  const lname = document.getElementById('s-lname').value.trim();
  const email = document.getElementById('s-email').value.trim();
  const country = document.getElementById('s-country').value;
  const pass = document.getElementById('s-pass').value;
  const pass2 = document.getElementById('s-pass2').value;
  const terms = document.getElementById('s-terms').checked;
  const btn = document.getElementById('signupBtn');
  const errEl = document.getElementById('alertError');
  const okEl = document.getElementById('alertSuccess');
  errEl.classList.remove('show'); okEl.classList.remove('show');

  if (!fname || !lname || !email || !pass) {
    errEl.textContent = 'Please fill in all fields.'; errEl.classList.add('show'); return;
  }
  if (pass.length < 8) {
    errEl.textContent = 'Password must be at least 8 characters.'; errEl.classList.add('show'); return;
  }
  if (pass !== pass2) {
    errEl.textContent = 'Passwords do not match.'; errEl.classList.add('show'); return;
  }
  if (!terms) {
    errEl.textContent = 'Please accept the Terms of Service.'; errEl.classList.add('show'); return;
  }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Creating account…';
  try {
    const { user } = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(user, { displayName: `${fname} ${lname}` });
    await setDoc(doc(db, 'users', user.uid), {
      uid: user.uid, firstName: fname, lastName: lname, email: user.email,
      country: country || '', createdAt: serverTimestamp(), accounts: [], totalPayout: 0, avatarUrl: ''
    });
    okEl.textContent = 'Account created! Redirecting to dashboard…';
    okEl.classList.add('show');
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
  } catch (e) {
    const msgs = {
      'auth/email-already-in-use': 'This email is already registered. Try logging in.',
      'auth/weak-password': 'Password is too weak. Please use at least 8 characters.',
      'auth/invalid-email': 'Please enter a valid email address.',
    };
    errEl.textContent = msgs[e.code] || 'Signup failed. Please try again.';
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Create My Account';
  }
};
</script>
</body>
</html>
