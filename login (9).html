<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login – Maxi Capital</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #1a7a4a;
  --primary-light: #22a060;
  --primary-dark: #125c36;
  --primary-dim: rgba(26,122,74,0.15);
  --black: #060d09;
  --dark: #0a110d;
  --dark-2: #0f1812;
  --dark-3: #141f17;
  --dark-4: #192619;
  --border: rgba(26,122,74,0.22);
  --border2: rgba(255,255,255,0.07);
  --text: #e8f0ea;
  --muted: #7a9485;
  --green: #34d399;
  --red: #f87171;
}
body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2rem; height: 64px;
  background: rgba(6,13,9,0.94); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.nav-logo { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 800; color: var(--primary-light); text-decoration: none; display: flex; align-items: center; gap: 8px; }
.nav-logo-mark { width: 28px; height: 28px; background: var(--primary); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #fff; font-weight: 800; }
.nav-links { display: flex; gap: 1rem; align-items: center; }
.nav-links a { color: var(--muted); text-decoration: none; font-size: 0.875rem; transition: color 0.2s; }
.nav-links a:hover { color: var(--text); }
.nav-btn { padding: 0.45rem 1.1rem; border-radius: 6px; font-size: 0.875rem; font-weight: 500; cursor: pointer; text-decoration: none; transition: all 0.2s; }
.btn-outline { border: 1px solid var(--border2); color: var(--text); background: transparent; }
.btn-outline:hover { border-color: var(--primary); color: var(--primary-light); }
.btn-primary { background: var(--primary); color: #fff; border: none; font-weight: 600; }
.btn-primary:hover { background: var(--primary-light); }

.auth-page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 6rem 1.5rem 3rem; position: relative; overflow: hidden; }
.auth-page::before { content: ''; position: absolute; top: -100px; left: 50%; transform: translateX(-50%); width: 700px; height: 500px; background: radial-gradient(ellipse, rgba(26,122,74,0.09) 0%, transparent 70%); pointer-events: none; }

.auth-card {
  width: 100%; max-width: 420px;
  background: var(--dark-2); border: 1px solid var(--border);
  border-radius: 16px; padding: 2.5rem; position: relative; z-index: 1;
}
.auth-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--primary), transparent); border-radius: 16px 16px 0 0; }

.auth-header { text-align: center; margin-bottom: 2rem; }
.auth-header .icon { width: 52px; height: 52px; background: rgba(26,122,74,0.12); border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 1.5rem; }
.auth-header h1 { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; color: var(--text); }
.auth-header p { color: var(--muted); font-size: 0.875rem; margin-top: 0.4rem; }

.form-group { margin-bottom: 1.2rem; }
.form-group label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--muted); margin-bottom: 0.5rem; letter-spacing: 0.04em; text-transform: uppercase; }
.form-group input { width: 100%; padding: 0.75rem 1rem; background: var(--dark-3); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-size: 0.95rem; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s; }
.form-group input:focus { border-color: var(--primary); }
.form-group input::placeholder { color: var(--muted); }

.form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-size: 0.85rem; }
.form-options label { display: flex; align-items: center; gap: 0.4rem; color: var(--muted); cursor: pointer; }
.form-options a { color: var(--primary-light); text-decoration: none; }
.form-options a:hover { text-decoration: underline; }

.btn-submit { width: 100%; padding: 0.85rem; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.btn-submit:hover { background: var(--primary-light); transform: translateY(-1px); }
.btn-submit:active { transform: translateY(0); }
.btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; color: var(--muted); font-size: 0.8rem; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border2); }

.auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--muted); }
.auth-footer a { color: var(--primary-light); text-decoration: none; font-weight: 500; }
.auth-footer a:hover { text-decoration: underline; }

.alert { padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.875rem; display: none; }
.alert.error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: #fca5a5; }
.alert.success { background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3); color: #6ee7b7; }
.alert.show { display: block; }

.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-mark">M</div>
    Maxi Capital
  </a>
  <div class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="index.html#programs">Challenges</a>
    <a href="login.html" class="nav-btn btn-outline" id="navLogin">Login</a>
    <a href="signup.html" class="nav-btn btn-primary" id="navSignup">Sign Up</a>
    <a href="dashboard.html" class="nav-btn btn-outline" id="navDashboard" style="display:none">Dashboard</a>
    <a href="profile.html" class="nav-btn btn-primary" id="navProfile" style="display:none">Profile</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="icon">🔑</div>
      <h1>Welcome Back</h1>
      <p>Login to access your funded account dashboard</p>
    </div>
    <div class="alert error" id="alertError"></div>
    <div class="alert success" id="alertSuccess"></div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="trader@example.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <div class="form-options">
      <label><input type="checkbox" /> Remember me</label>
      <a href="#">Forgot password?</a>
    </div>
    <button class="btn-submit" id="loginBtn" onclick="handleLogin()">Login to Dashboard</button>
    <div class="divider">or</div>
    <div class="auth-footer" style="margin-top:0">
      Don't have an account? <a href="signup.html">Create one free →</a>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDaKGU5Nrtof0lA7GwZN9baIwdpVZaftbQ",
  authDomain: "the-funded.firebaseapp.com",
  projectId: "the-funded",
  storageBucket: "the-funded.firebasestorage.app",
  messagingSenderId: "656425279116",
  appId: "1:656425279116:web:d309fc0a731066f28225a9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Already logged in → redirect
onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.href = 'dashboard.html';
    return;
  }
  // Not logged in: ensure login/signup nav visible, hide dashboard/profile
  ['navLogin','navSignup'].forEach(id => { const el=document.getElementById(id); if(el) el.style.display=''; });
  ['navDashboard','navProfile'].forEach(id => { const el=document.getElementById(id); if(el) el.style.display='none'; });
});

window.handleLogin = async function () {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('loginBtn');
  const errEl    = document.getElementById('alertError');
  const okEl     = document.getElementById('alertSuccess');
  errEl.classList.remove('show'); okEl.classList.remove('show');

  if (!email || !password) {
    errEl.textContent = 'Please fill in all fields.';
    errEl.classList.add('show'); return;
  }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Logging in…';
  try {
    await signInWithEmailAndPassword(auth, email, password);
    okEl.textContent = 'Login successful! Redirecting…';
    okEl.classList.add('show');
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
  } catch (err) {
    const msgs = {
      'auth/user-not-found': 'No account found with this email.',
      'auth/wrong-password': 'Incorrect password. Try again.',
      'auth/invalid-credential': 'Invalid email or password.',
      'auth/too-many-requests': 'Too many attempts. Please wait a moment.',
    };
    errEl.textContent = msgs[err.code] || 'Login failed. Please try again.';
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Login to Dashboard';
  }
};

// Enter key support
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') window.handleLogin();
});
</script>
</body>
</html>
